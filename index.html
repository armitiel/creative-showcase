    <!-- Apply saved theme before first paint to avoid flash -->
    <script>
      (function () {
        try {
          var th = localStorage.getItem('aa_theme') || 'light';
          document.documentElement.setAttribute('data-theme', th);
          if (th === 'dark') document.documentElement.classList.add('dark');
          document.documentElement.style.background = th === 'dark' ? '#14110C' : '#F3EFE6';
        } catch (e) {}
      })();
    </script>
    <style>body{margin:0;background:inherit}</style>
